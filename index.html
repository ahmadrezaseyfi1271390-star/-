<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>گالری تصاویر</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:tahoma;
}

body{
background:#0f0f0f;
color:#fff;
}

header{
height:60px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 15px;
background:#181818;
position:sticky;
top:0;
z-index:100;
}

.logo{
font-size:22px;
font-weight:bold;
}

.menu-btn{
font-size:28px;
cursor:pointer;
}

.sidebar{
position:fixed;
top:0;
right:-260px;
width:260px;
height:100%;
background:#1b1b1b;
transition:.3s;
z-index:1000;
overflow:auto;
}

.sidebar.active{
right:0;
}

.sidebar h2{
padding:20px;
border-bottom:1px solid #333;
}

.sidebar div{
padding:15px 20px;
cursor:pointer;
border-bottom:1px solid #2c2c2c;
}

.sidebar div:hover{
background:#2c2c2c;
}

.search-box{
padding:15px;
}

.search-box input{
width:100%;
padding:12px;
border:none;
border-radius:12px;
font-size:16px;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:15px;
padding:15px;
}

.card{
background:#1a1a1a;
border-radius:18px;
overflow:hidden;
cursor:pointer;
transition:.3s;
}

.card:hover{
transform:scale(1.03);
}

.card img{
width:100%;
height:250px;
object-fit:cover;
display:block;
}

.card .info{
padding:12px;
}

.card .title{
font-size:18px;
margin-bottom:8px;
}

.card .cat{
font-size:13px;
opacity:.7;
}

.viewer{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.95);
z-index:2000;
justify-content:center;
align-items:center;
flex-direction:column;
padding:20px;
}

.viewer img{
max-width:95%;
max-height:75%;
border-radius:15px;
}

.viewer h2{
margin-top:15px;
}

.viewer p{
margin-top:10px;
text-align:center;
max-width:700px;
}

.close{
position:absolute;
top:20px;
left:20px;
font-size:35px;
cursor:pointer;
}
</style>
</head>
<body>

<header>
<div class="logo">گالری</div>
<div class="menu-btn" onclick="toggleMenu()">☰</div>
</header>

<div class="sidebar" id="sidebar">
<h2>دسته‌بندی‌ها</h2>

<div onclick="filterCategory('همه')">همه</div>
<div onclick="filterCategory('طبیعت')">طبیعت</div>
<div onclick="filterCategory('ماشین')">ماشین</div>
<div onclick="filterCategory('انیمه')">انیمه</div>
<div onclick="filterCategory('فناوری')">فناوری</div>
</div>

<div class="search-box">
<input
type="text"
id="search"
placeholder="جستجو..."
onkeyup="searchImages()">
</div>

<div class="gallery" id="gallery"></div>

<div class="viewer" id="viewer">
<div class="close" onclick="closeViewer()">✕</div>
<img id="bigImg">
<h2 id="bigTitle"></h2>
<p id="bigDesc"></p>
</div>

<script>

const images = [

{
title:"نمونه تصویر",
category:"طبیعت",
desc:"توضیح تصویر",
image:"https://taw-bio.ir/f/item/image/jcsfh"
},

{
title:"نمونه دوم",
category:"فناوری",
desc:"متن دلخواه",
image:"https://taw-bio.ir/f/item/image/jcsfh"
}

];

let current = [...images];

function render(list){

const gallery =
document.getElementById("gallery");

gallery.innerHTML="";

list.forEach(item=>{

gallery.innerHTML += `

<div class="card"
onclick="openViewer(
'${item.image}',
'${item.title}',
'${item.desc}'
)">

<img src="${item.image}">

<div class="info">
<div class="title">
${item.title}
</div>

<div class="cat">
${item.category}
</div>
</div>

</div>

`;

});

}

function searchImages(){

let q =
document
.getElementById("search")
.value
.toLowerCase();

let result =
current.filter(x=>

x.title.toLowerCase().includes(q)
||
x.desc.toLowerCase().includes(q)
||
x.category.toLowerCase().includes(q)

);

render(result);

}

function filterCategory(cat){

if(cat==="همه"){

current=[...images];

}else{

current=
images.filter(
x=>x.category===cat
);

}

render(current);

toggleMenu();

}

function toggleMenu(){

document
.getElementById("sidebar")
.classList
.toggle("active");

}

function openViewer(
img,
title,
desc
){

document.getElementById(
"bigImg"
).src=img;

document.getElementById(
"bigTitle"
).innerText=title;

document.getElementById(
"bigDesc"
).innerText=desc;

document.getElementById(
"viewer"
).style.display="flex";

}

function closeViewer(){

document.getElementById(
"viewer"
).style.display="none";

}

render(images);

</script>

</body>
</html>
