<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>گالری تصاویر با ذخیره‌سازی</title>

    <style>
        /* ===== استایل‌های پایه ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Tahoma, sans-serif;
        }

        body {
            background: #0f0f0f;
            color: #fff;
        }

        /* ===== هدر ===== */
        header {
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            background: #181818;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid #2a2a2a;
        }

        .logo {
            font-size: 22px;
            font-weight: bold;
        }
        .logo span { color: #4caf50; }

        .menu-btn {
            font-size: 28px;
            cursor: pointer;
            user-select: none;
        }

        /* ===== سایدبار ===== */
        .sidebar {
            position: fixed;
            top: 0;
            right: -280px;
            width: 280px;
            height: 100%;
            background: #1b1b1b;
            transition: .3s ease;
            z-index: 1000;
            overflow: auto;
            padding-bottom: 30px;
            border-left: 1px solid #333;
        }

        .sidebar.active {
            right: 0;
        }

        .sidebar h2 {
            padding: 20px;
            border-bottom: 1px solid #333;
        }

        .sidebar .cat-item {
            padding: 15px 20px;
            cursor: pointer;
            border-bottom: 1px solid #2c2c2c;
            transition: .2s;
        }

        .sidebar .cat-item:hover {
            background: #2c2c2c;
            padding-right: 25px;
        }

        /* ===== بخش جستجو و فرم ===== */
        .controls {
            padding: 15px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            background: #141414;
            border-bottom: 1px solid #2a2a2a;
        }

        .controls .search-box {
            flex: 2;
            min-width: 150px;
        }

        .controls .search-box input {
            width: 100%;
            padding: 12px 15px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            background: #222;
            color: #fff;
            outline: 1px solid #333;
            transition: .2s;
        }
        .controls .search-box input:focus {
            outline: 1px solid #4caf50;
        }

        /* ===== فرم افزودن ===== */
        .add-form {
            flex: 3;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
            background: #1a1a1a;
            padding: 10px 15px;
            border-radius: 16px;
        }

        .add-form input {
            flex: 1 1 120px;
            padding: 10px 12px;
            border: none;
            border-radius: 10px;
            background: #2a2a2a;
            color: #fff;
            font-size: 14px;
            outline: 1px solid #333;
            transition: .2s;
        }
        .add-form input:focus {
            outline: 1px solid #4caf50;
        }
        .add-form input::placeholder {
            color: #888;
        }

        .add-form button {
            padding: 10px 18px;
            border: none;
            border-radius: 10px;
            background: #4caf50;
            color: #fff;
            font-weight: bold;
            cursor: pointer;
            transition: .2s;
            white-space: nowrap;
        }
        .add-form button:hover {
            background: #66bb6a;
            transform: scale(1.02);
        }

        /* ===== گالری ===== */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 18px;
            padding: 20px 15px;
        }

        .card {
            background: #1a1a1a;
            border-radius: 18px;
            overflow: hidden;
            transition: .3s;
            position: relative;
            border: 1px solid #2a2a2a;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: #4caf50;
            box-shadow: 0 8px 20px rgba(0,0,0,0.6);
        }

        .card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            display: block;
            cursor: pointer;
            background: #222;
        }

        .card .info {
            padding: 12px 14px;
        }

        .card .title {
            font-size: 17px;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .card .cat {
            font-size: 13px;
            opacity: .7;
            display: inline-block;
            background: #2a2a2a;
            padding: 2px 10px;
            border-radius: 20px;
        }

        /* دکمه حذف */
        .card .delete-btn {
            position: absolute;
            top: 8px;
            left: 8px;
            background: rgba(220, 20, 20, 0.9);
            border: none;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: .2s;
            z-index: 10;
            opacity: 0;
            transform: scale(0.8);
        }
        .card:hover .delete-btn {
            opacity: 1;
            transform: scale(1);
        }
        .card .delete-btn:hover {
            background: #ff3333;
            transform: scale(1.15) !important;
        }

        /* ===== نمایشگر بزرگ ===== */
        .viewer {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, .94);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding: 20px;
        }

        .viewer img {
            max-width: 95%;
            max-height: 70%;
            border-radius: 15px;
            object-fit: contain;
        }

        .viewer h2 {
            margin-top: 20px;
            font-size: 26px;
        }

        .viewer p {
            margin-top: 10px;
            text-align: center;
            max-width: 700px;
            opacity: .8;
            font-size: 16px;
            padding: 0 15px;
        }

        .close {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 38px;
            cursor: pointer;
            transition: .2s;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: rgba(255,255,255,0.05);
        }
        .close:hover {
            background: rgba(255,0,0,0.2);
            transform: rotate(90deg);
        }

        /* ===== پیام خالی ===== */
        .empty-msg {
            text-align: center;
            padding: 60px 20px;
            font-size: 18px;
            opacity: .5;
            grid-column: 1 / -1;
        }

        /* ===== ریسپانسیو ===== */
        @media (max-width: 600px) {
            .add-form input { flex: 1 1 100%; }
            .add-form button { width: 100%; }
            .controls { flex-direction: column; }
            .sidebar { width: 240px; right: -240px; }
        }
    </style>
</head>
<body>

    <!-- ===== هدر ===== -->
    <header>
        <div class="logo">📸 <span>گالری</span></div>
        <div class="menu-btn" onclick="toggleMenu()">☰</div>
    </header>

    <!-- ===== سایدبار ===== -->
    <div class="sidebar" id="sidebar">
        <h2>📂 دسته‌بندی‌ها</h2>
        <div class="cat-item" onclick="filterCategory('همه')">🌟 همه</div>
        <div class="cat-item" onclick="filterCategory('طبیعت')">🌿 طبیعت</div>
        <div class="cat-item" onclick="filterCategory('ماشین')">🚗 ماشین</div>
        <div class="cat-item" onclick="filterCategory('انیمه')">🎌 انیمه</div>
        <div class="cat-item" onclick="filterCategory('فناوری')">💻 فناوری</div>
        <div class="cat-item" onclick="filterCategory('سایر')">📦 سایر</div>
    </div>

    <!-- ===== بخش کنترلی (جستجو + فرم افزودن) ===== -->
    <div class="controls">
        <div class="search-box">
            <input type="text" id="search" placeholder="🔍 جستجو در عنوان، توضیحات یا دسته..." onkeyup="searchImages()">
        </div>

        <div class="add-form">
            <input type="text" id="newTitle" placeholder="عنوان (اجباری)">
            <input type="text" id="newCategory" placeholder="دسته‌بندی" value="سایر">
            <input type="text" id="newDesc" placeholder="توضیحات">
            <input type="url" id="newImage" placeholder="آدرس تصویر (URL)">
            <button onclick="addImage()">➕ افزودن</button>
        </div>
    </div>

    <!-- ===== گالری ===== -->
    <div class="gallery" id="gallery"></div>

    <!-- ===== نمایشگر بزرگ ===== -->
    <div class="viewer" id="viewer">
        <div class="close" onclick="closeViewer()">✕</div>
        <img id="bigImg" src="" alt="تصویر بزرگ">
        <h2 id="bigTitle"></h2>
        <p id="bigDesc"></p>
    </div>

    <script>
        // ============================================================
        //  داده‌های پیش‌فرض (با تصاویر واقعی و متنوع)
        // ============================================================
        function getDefaultImages() {
            return [
                { id: crypto.randomUUID(), title: "جنگل بارانی", category: "طبیعت", desc: "نمایی از جنگل‌های استوایی پر از حیات", image: "https://picsum.photos/seed/forest1/400/300" },
                { id: crypto.randomUUID(), title: "شب پرستاره", category: "طبیعت", desc: "آسمان شب در دل کوهستان", image: "https://picsum.photos/seed/night1/400/300" },
                { id: crypto.randomUUID(), title: "خودروی کلاسیک", category: "ماشین", desc: "یک ماشین قدیمی و دوست‌داشتنی", image: "https://picsum.photos/seed/car1/400/300" },
                { id: crypto.randomUUID(), title: "ابرخودرو", category: "ماشین", desc: "طراحی آینده‌نگرانه و سرعت بالا", image: "https://picsum.photos/seed/sport1/400/300" },
                { id: crypto.randomUUID(), title: "سایبرپانک", category: "انیمه", desc: "فضای علمی-تخیلی به سبک انیمه", image: "https://picsum.photos/seed/anime1/400/300" },
                { id: crypto.randomUUID(), title: "لب‌تاپ مدرن", category: "فناوری", desc: "لپ‌تاپ فوق‌باریک با نمایشگر ۴K", image: "https://picsum.photos/seed/tech1/400/300" }
            ];
        }

        // ============================================================
        //  متغیرهای اصلی
        // ============================================================
        let allImages = [];

        // ============================================================
        //  توابع ذخیره‌سازی و بارگذاری (localStorage)
        // ============================================================
        function saveToLocalStorage() {
            localStorage.setItem('galleryImages', JSON.stringify(allImages));
        }

        function loadFromLocalStorage() {
            const stored = localStorage.getItem('galleryImages');
            if (stored) {
                try {
                    const parsed = JSON.parse(stored);
                    if (Array.isArray(parsed) && parsed.length > 0) {
                        allImages = parsed;
                        return;
                    }
                } catch (e) { /* fallback */ }
            }
            // اگر ذخیره‌ای نبود یا خراب بود، نمونه‌ها را بارگذاری کن
            allImages = getDefaultImages();
            saveToLocalStorage();
        }

        // ============================================================
        //  رندر اصلی گالری
        // ============================================================
        function render(list) {
            const gallery = document.getElementById('gallery');
            gallery.innerHTML = '';

            if (!list || list.length === 0) {
                gallery.innerHTML = `<div class="empty-msg">😕 هیچ تصویری یافت نشد.<br>یکی با فرم بالا اضافه کن!</div>`;
                return;
            }

            list.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';

                // جلوگیری از ارور در صورت نداشتن id (سازگاری با نسخه‌های قدیمی‌تر)
                const safeId = item.id || 'no-id';

                card.innerHTML = `
                    <button class="delete-btn" onclick="deleteImage('${safeId}')">✕</button>
                    <img src="${item.image}" alt="${item.title}" loading="lazy" onclick="openViewer('${item.image}', '${item.title}', '${item.desc}')">
                    <div class="info">
                        <div class="title">${item.title}</div>
                        <div class="cat">📂 ${item.category || 'سایر'}</div>
                    </div>
                `;
                gallery.appendChild(card);
            });
        }

        // نمایش آرایه‌ی اصلی (با اعمال فیلتر جستجو در صورت نیاز)
        function renderAll() {
            const q = document.getElementById('search').value.trim().toLowerCase();
            if (q === '') {
                render(allImages);
            } else {
                const filtered = allImages.filter(item =>
                    item.title.toLowerCase().includes(q) ||
                    (item.desc && item.desc.toLowerCase().includes(q)) ||
                    (item.category && item.category.toLowerCase().includes(q))
                );
                render(filtered);
            }
        }

        // ============================================================
        //  افزودن تصویر جدید
        // ============================================================
        function addImage() {
            const titleInput = document.getElementById('newTitle');
            const catInput = document.getElementById('newCategory');
            const descInput = document.getElementById('newDesc');
            const imgInput = document.getElementById('newImage');

            const title = titleInput.value.trim();
            const category = catInput.value.trim() || 'سایر';
            const desc = descInput.value.trim();
            const image = imgInput.value.trim();

            if (!title || !image) {
                alert('❌ لطفاً عنوان و آدرس تصویر را وارد کنید.');
                return;
            }

            try {
                new URL(image); // اعتبارسنجی آدرس
            } catch (_) {
                alert('❌ آدرس تصویر معتبر نیست (با http:// یا https:// شروع شود).');
                return;
            }

            const newItem = {
                id: crypto.randomUUID(),
                title,
                category,
                desc,
                image
            };

            allImages.push(newItem);
            saveToLocalStorage();

            // پاک کردن فرم
            titleInput.value = '';
            catInput.value = 'سایر';
            descInput.value = '';
            imgInput.value = '';

            renderAll(); // به‌روزرسانی گالری
        }

        // ============================================================
        //  حذف تصویر (با استفاده از id یکتا)
        // ============================================================
        function deleteImage(id) {
            const item = allImages.find(it => it.id === id);
            if (!item) return;
            if (!confirm(`آیا از حذف "${item.title}" مطمئن هستی؟`)) return;

            allImages = allImages.filter(it => it.id !== id);
            saveToLocalStorage();
            renderAll();
        }

        // ============================================================
        //  فیلتر بر اساس دسته‌بندی (از سایدبار)
        // ============================================================
        function filterCategory(cat) {
            document.getElementById('search').value = ''; // خالی کردن جستجو
            if (cat === 'همه') {
                render(allImages);
            } else {
                const filtered = allImages.filter(item => item.category === cat);
                render(filtered);
            }
            // بستن سایدبار در موبایل
            document.getElementById('sidebar').classList.remove('active');
        }

        // ============================================================
        //  جستجو
        // ============================================================
        function searchImages() {
            renderAll();
        }

        // ============================================================
        //  منو (سایدبار)
        // ============================================================
        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active');
        }

        // ============================================================
        //  نمایشگر بزرگ
        // ============================================================
        function openViewer(img, title, desc) {
            document.getElementById('bigImg').src = img;
            document.getElementById('bigTitle').innerText = title;
            document.getElementById('bigDesc').innerText = desc || 'بدون توضیحات';
            document.getElementById('viewer').style.display = 'flex';
        }

        function closeViewer() {
            document.getElementById('viewer').style.display = 'none';
        }

        // کلیک روی background برای بستن Viewer
        document.getElementById('viewer').addEventListener('click', function(e) {
            if (e.target === this) closeViewer();
        });

        // ============================================================
        //  مقداردهی اولیه
        // ============================================================
        loadFromLocalStorage();
        renderAll();
    </script>

</body>
  </html>
